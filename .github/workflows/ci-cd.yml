name: CI/CD Pipeline

on:
  push:
    branches: [ "master" ]

jobs:

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Run tests
        run: dotnet test

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: dotnet build --configuration Release

      - name: Create artifact
        run: echo "build success" > artifact.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact
          path: artifact.txt

  deploy_staging:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: artifact

      - name: Deploy to staging
        run: cat artifact.txt

  verify_staging:
    runs-on: ubuntu-latest
    needs: deploy_staging
    steps:
      - name: Smoke test
        run: test 1 -eq 1

  deploy_production:
    runs-on: ubuntu-latest
    needs: verify_staging
    environment:
      name: production
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: artifact

      - name: Deploy to production
        run: cat artifact.txt  
